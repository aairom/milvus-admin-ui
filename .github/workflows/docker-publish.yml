name: 🐳 Build & Push Docker Image (mcp-milvus-server)

# Builds the Milvus MCP backend image from the mcp-server/ subdirectory
# of this repo and pushes it to Docker Hub. The published image name is
# mcp-milvus-server -- the upstream repo's display name (milvus-admin-ui)
# stays the same; only the MCP-server build is published here.
#
# Same shape as gitpilot's / mcp-postgre-server's / mcp-inspector-server's
# docker-publish workflows so all four MCP-stack images carry consistent
# tags and labels.
#
# Triggers when files under mcp-server/ change so a doc-only or UI-only
# commit doesn't kick off a publish.

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: "Release tag (e.g., v1.2.3 or 1.2.3). Defaults to 'latest'."
        required: true
        default: "latest"

permissions:
  contents: read

concurrency:
  group: dockerhub-publish-mcp-milvus-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: 🔨 Build & Push
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 📝 Derive version tags
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            RAW="${GITHUB_REF#refs/tags/}"
          else
            RAW="${{ github.event.inputs.version }}"
          fi
          if [ -z "$RAW" ] || [ "$RAW" = "latest" ]; then
            SEMVER="latest"
          elif [[ "$RAW" =~ ^v ]]; then
            SEMVER="${RAW#v}"
          else
            SEMVER="$RAW"
          fi
          echo "SEMVER=$SEMVER" >> $GITHUB_ENV
          echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_ENV
          echo "BUILD_DATE=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> $GITHUB_ENV
          echo "✅ Version: $SEMVER (sha: ${GITHUB_SHA::7})"

      - name: 🔧 Compute image name
        shell: bash
        run: |
          USER_LC="${{ secrets.DOCKERHUB_USERNAME }}"
          USER_LC="${USER_LC,,}"
          IMAGE="docker.io/${USER_LC}/mcp-milvus-server"
          echo "IMAGE=$IMAGE" >> $GITHUB_ENV
          echo "📦 Image: $IMAGE"

      - name: 🏗️ Set up QEMU (multi-arch)
        uses: docker/setup-qemu-action@v3

      - name: 🏗️ Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔐 Docker Hub login
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 🏷️ Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          flavor: |
            latest=auto
          tags: |
            type=raw,value=${{ env.SEMVER }},enable=${{ env.SEMVER != 'latest' }}
            type=raw,value=latest,enable=${{ github.event_name == 'release' || env.SEMVER == 'latest' }}
            type=raw,value=sha-${{ env.SHORT_SHA }}
            type=semver,pattern={{version}},value=${{ env.SEMVER }},enable=${{ env.SEMVER != 'latest' }}
            type=semver,pattern={{major}}.{{minor}},value=${{ env.SEMVER }},enable=${{ env.SEMVER != 'latest' }}
          labels: |
            org.opencontainers.image.title=mcp-milvus-server
            org.opencontainers.image.description=Milvus MCP server for GitPilot — collection discovery, vector search, RAG codegen, deterministic test vectors. Built from milvus-admin-ui/mcp-server.
            org.opencontainers.image.url=https://github.com/${{ github.repository }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.version=${{ env.SEMVER }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ env.BUILD_DATE }}
            org.opencontainers.image.licenses=Apache-2.0

      - name: 🔨 Build & push (multi-arch)
        id: build
        uses: docker/build-push-action@v6
        with:
          # The MCP server lives in a subdirectory; the existing UI at the
          # repo root is unaffected and not published by this workflow.
          context: ./mcp-server
          file: ./mcp-server/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=mcp-milvus-server
          cache-to: type=gha,mode=max,scope=mcp-milvus-server
          build-args: |
            BUILD_VERSION=${{ env.SEMVER }}
            BUILD_COMMIT=${{ github.sha }}
            BUILD_DATE=${{ env.BUILD_DATE }}

      - name: ✅ Smoke-test image (import only — Milvus not required)
        shell: bash
        run: |
          REF="$(echo "${{ steps.meta.outputs.tags }}" | head -n1)"
          echo "🔍 Smoke testing $REF"
          # /health needs a Milvus connection; the import smoke is enough
          # for the publish gate. Full integration runs in the gitpilot
          # docker-compose.mcp.yml stack with the real Milvus container.
          docker run --rm --pull=never --entrypoint python "$REF" \
            -c "import mcp_milvus_server; print('ok', mcp_milvus_server.__name__)"

      - name: 📋 Inspect multi-arch manifest
        if: always()
        shell: bash
        run: |
          if [ "${{ env.SEMVER }}" != "latest" ]; then
            docker buildx imagetools inspect "${{ env.IMAGE }}:${{ env.SEMVER }}" || true
          fi
          if [ "${{ github.event_name }}" = "release" ] || [ "${{ env.SEMVER }}" = "latest" ]; then
            docker buildx imagetools inspect "${{ env.IMAGE }}:latest" || true
          fi

      - name: 📊 Summary
        if: always()
        shell: bash
        run: |
          USER_LC="${{ secrets.DOCKERHUB_USERNAME }}"
          USER_LC="${USER_LC,,}"
          {
            echo "## 🐳 Published mcp-milvus-server"
            echo ""
            echo "Built from \`milvus-admin-ui/mcp-server\` — the admin UI itself is unchanged."
            echo ""
            echo "| Tag | Pull command |"
            echo "|-----|--------------|"
            echo "| \`${{ env.SEMVER }}\` | \`docker pull ${USER_LC}/mcp-milvus-server:${{ env.SEMVER }}\` |"
            echo "| \`sha-${{ env.SHORT_SHA }}\` | \`docker pull ${USER_LC}/mcp-milvus-server:sha-${{ env.SHORT_SHA }}\` |"
            if [ "${{ github.event_name }}" = "release" ] || [ "${{ env.SEMVER }}" = "latest" ]; then
              echo "| \`latest\` | \`docker pull ${USER_LC}/mcp-milvus-server:latest\` |"
            fi
            echo ""
            echo "Multi-arch: \`linux/amd64\`, \`linux/arm64\`"
          } >> "$GITHUB_STEP_SUMMARY"
